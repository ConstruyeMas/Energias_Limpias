<script>

/* VARIABLES */

let consumoBimestral
let pagoBimestral
let consumoMensual
let consumoAnual
let sistemaKW
let costoKWH

let produccionAnual
let coberturaConsumo
let areaSistema

let ahorroMensualGlobal
let precioSistema

let radiacionSolar
let diagnosticoTexto
let folioCotizacion

let fotoReciboBase64

const EFICIENCIA_SISTEMA = 0.85
const DEGRADACION_PANEL = 0.005

const PDF_TEMPLATE_URL = "assets/plantilla.png"
const PDF_PAGE = { w: 210, h: 297 }
const PDF_LAYOUT = {
nombre: { x: 195, y: 48, size: 10, align: "right" },
monto: { x: 105, y: 120, size: 18, align: "center" },
montoTexto: { x: 105, y: 128, size: 8, align: "center" },
referencia: { x: 105, y: 190, size: 14, align: "center" },
folioAut: { x: 105, y: 214, size: 11, align: "center" },
qr: { x: 20, y: 235, size: 40 }
}
const PDF_SHOW_RECIBO = false
const PDF_REPORT = { col1X: 20, col2X: 115, startY: 140, lineHeight: 5.5, size: 8 }

/* NAVEGACION */

let currentIndex=0

const screens=[
"splash",
"cliente",
"recibo",
"analisis",
"paneles",
"cotizacion",
"reporte"
]

function goTo(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function nextScreen(){

currentIndex++

if(currentIndex>=screens.length)return

goTo(screens[currentIndex])

if(screens[currentIndex]==="analisis") calcularSistema()
if(screens[currentIndex]==="reporte") llenarReporte()

}

/* FOTO RECIBO */

fotoInput.addEventListener("change",function(){

let reader=new FileReader()

reader.onload=e=>{
fotoReciboBase64 = e.target.result
previewFoto.src = fotoReciboBase64
}

reader.readAsDataURL(this.files[0])

})


/* RADIACION */

function calcularRadiacion(){

let ciudadUsuario = ciudad.value.toLowerCase()

if(ciudadUsuario.includes("durango")) radiacionSolar = 1650
else if(ciudadUsuario.includes("chihuahua")) radiacionSolar = 1750
else if(ciudadUsuario.includes("hermosillo")) radiacionSolar = 1850
else radiacionSolar = 1600

}


/* CALCULO SISTEMA */

function calcularSistema(){

calcularRadiacion()

consumoBimestral=parseFloat(consumo.value)
pagoBimestral=parseFloat(pago.value)

consumoMensual=consumoBimestral/2
consumoAnual=consumoMensual*12

costoKWH=pagoBimestral/consumoBimestral

sistemaKW=consumoMensual/150

resultadoConsumo.innerText="Consumo mensual "+consumoMensual.toFixed(0)+" kWh"

resultadoSistema.innerText="Sistema recomendado "+sistemaKW.toFixed(1)+" kW"

consumoAnualTexto.innerText="Consumo anual "+consumoAnual.toFixed(0)+" kWh"

radiacionZona.innerText="RadiaciÃ³n estimada "+radiacionSolar+" kWh/kW/aÃ±o"

eficienciaSistema.innerText="Eficiencia sistema "+(EFICIENCIA_SISTEMA*100)+"%"

diagnosticoDAC()

calcularPaneles()

}


function diagnosticoDAC(){

if(consumoAnual<4000) diagnosticoTexto="Consumo normal"
else if(consumoAnual<6000) diagnosticoTexto="Consumo elevado"
else diagnosticoTexto="Riesgo DAC"

diagnosticoEnergia.innerText=diagnosticoTexto

}


/* PANELES */

function calcularPaneles(){

let p550=Math.ceil((sistemaKW*1000)/550)
let p660=Math.ceil((sistemaKW*1000)/660)
let p770=Math.ceil((sistemaKW*1000)/770)

opcionA.innerText=p550+" paneles 550W"
opcionB.innerText=p660+" paneles 660W"
opcionC.innerText=p770+" paneles 770W"

opcionA.onclick=()=>cotizar(p550,550)
opcionB.onclick=()=>cotizar(p660,660)
opcionC.onclick=()=>cotizar(p770,770)

}


/* COTIZAR */

function generarFolio(){

let ano=new Date().getFullYear()

let consecutivo=Date.now().toString().slice(-5)

folioCotizacion="CM-EL-"+ano+"-"+consecutivo

}


function cotizar(paneles,potencia){

generarFolio()

let potenciaSistema=paneles*potencia/1000

precioSistema=potenciaSistema*20000

produccionAnual = potenciaSistema * radiacionSolar * EFICIENCIA_SISTEMA

coberturaConsumo = (produccionAnual / consumoAnual) * 100

let generacionMensual=produccionAnual/12

ahorroMensualGlobal=generacionMensual*costoKWH

let retorno=precioSistema/(ahorroMensualGlobal*12)


/* AREA */

let areaPanel

if(potencia==550) areaPanel=2.6
else if(potencia==660) areaPanel=3
else areaPanel=3.5

areaSistema = paneles * areaPanel


/* REDONDEOS */

let produccionRedondeada = Math.round(produccionAnual/100)*100

let ahorroRedondeado = Math.round(ahorroMensualGlobal/50)*50

panelFinal.innerText="Paneles "+paneles

produccionSistema.innerText="ProducciÃ³n anual aproximada "+produccionRedondeada+" kWh"

coberturaSistema.innerText="Cobertura del consumo "+coberturaConsumo.toFixed(0)+"%"

areaSistemaTexto.innerText="Ãrea requerida aproximada "+areaSistema.toFixed(1)+" mÂ²"

ahorroMensual.innerText="Ahorro mensual estimado $"+ahorroRedondeado

retorno.innerText="Retorno estimado "+Math.round(retorno)+" aÃ±os"

precioFinal.innerText="InversiÃ³n $"+precioSistema.toFixed(0)

generarGrafica()

nextScreen()

}


/* GRAFICA */

function generarGrafica(){

let anos=[]
let ahorro=[]
let inversion=[]

for(let i=0;i<=25;i++){

let produccionDegradada =
produccionAnual*Math.pow(1-DEGRADACION_PANEL,i)

let ahorroAnual = produccionDegradada*costoKWH

anos.push(i)

ahorro.push((ahorroAnual*i)-precioSistema)

inversion.push(precioSistema)

}

new Chart(graficaROI,{
type:'line',
data:{
labels:anos,
datasets:[
{label:'Ahorro acumulado',data:ahorro,borderColor:'#00ff88'},
{label:'InversiÃ³n',data:inversion,borderColor:'#ff4444'}
]
}
})

}


/* QR */



function generarQR(){

let cliente = (nombre.value||"").trim()
if(cliente.length>40) cliente = cliente.slice(0,40)

let link = (typeof pdfLink !== "undefined" ? (pdfLink.value||"") : "").trim()
let textoQR = link ? link :
"CM-EL\n"+
"Folio: "+(folioCotizacion||"")+"\n"+
"Cliente: "+cliente+"\n"+
"Total: "+formatMoney(precioSistema)

let qrEl = document.getElementById("qr")
qrEl.innerHTML=""

try{
new QRCode(qrEl,{
text:textoQR,
width:120,
height:120
})
}catch(e){
let fallback = link ? link.slice(0,120) : "Folio: "+(folioCotizacion||"")
qrEl.innerHTML=""
new QRCode(qrEl,{
text:fallback,
width:120,
height:120
})
}

}

if(typeof pdfLink !== "undefined"){
pdfLink.addEventListener("input",()=>{
if(screens[currentIndex]==="reporte"){
generarQR()
}
})
}
function formatMoney(value){
let n=Number(value||0)
let sign=n<0?"-":""
n=Math.abs(n)
let intPart=Math.floor(n)
let dec=Math.round((n-intPart)*100)
if(dec===100){
intPart+=1
dec=0
}
let s=intPart.toString()
let groups=[]
while(s.length>3){
groups.unshift(s.slice(-3))
s=s.slice(0,-3)
}
groups.unshift(s)
let formatted=groups.join(",")
if(groups.length>2){
let idx=formatted.indexOf(",")
formatted=formatted.slice(0,idx)+"'"+formatted.slice(idx+1)
}
let decStr=dec.toString().padStart(2,"0")
return sign+"$"+formatted+"."+decStr
}

function numeroALetras(num){
num=Math.floor(Number(num||0))
if(num===0) return "cero"
if(num<0) return "menos "+numeroALetras(Math.abs(num))
let words=""
let millones=Math.floor(num/1000000)
let miles=Math.floor((num%1000000)/1000)
let cientos=num%1000
if(millones>0){
if(millones===1) words+="un millon"
else words+=seccion(millones)+" millones"
}
if(miles>0){
if(words) words+=" "
if(miles===1) words+="mil"
else words+=seccion(miles)+" mil"
}
if(cientos>0){
if(words) words+=" "
words+=seccion(cientos)
}
return words
}

function seccion(n){
return centenas(n)
}

function centenas(n){
if(n===0) return ""
if(n===100) return "cien"
let centenasArr=["","ciento","doscientos","trescientos","cuatrocientos","quinientos","seiscientos","setecientos","ochocientos","novecientos"]
let c=Math.floor(n/100)
let r=n%100
let text=centenasArr[c]
if(r>0){
text+=(text?" ":"")+decenas(r)
}
return text
}

function decenas(n){
if(n<10) return unidades(n)
if(n>=10 && n<20){
let especiales=["diez","once","doce","trece","catorce","quince","dieciseis","diecisiete","dieciocho","diecinueve"]
return especiales[n-10]
}
if(n<30){
if(n===20) return "veinte"
return "veinti"+unidades(n-20)
}
let tensArr=["","","veinte","treinta","cuarenta","cincuenta","sesenta","setenta","ochenta","noventa"]
let t=Math.floor(n/10)
let u=n%10
let text=tensArr[t]
if(u>0) text+=" y "+unidades(u)
return text
}

function unidades(n){
let units=["","uno","dos","tres","cuatro","cinco","seis","siete","ocho","nueve"]
return units[n]
}

function montoEnLetra(value){
let n=Number(value||0)
let intPart=Math.floor(Math.abs(n))
let dec=Math.round((Math.abs(n)-intPart)*100)
if(dec===100){
intPart+=1
dec=0
}
let decStr=dec.toString().padStart(2,"0")
let letras=numeroALetras(intPart)
if(letras==="") letras="cero"
letras=letras.charAt(0).toUpperCase()+letras.slice(1)
return "(Son: "+letras+" de pesos "+decStr+"/100 M.N.)"
}

function pdfText(doc,text,x,y,options){
if(!text)return
let size=10
let align="left"
if(options){
if(options.size) size=options.size
if(options.align) align=options.align
}
doc.setFontSize(size)
doc.text(String(text),x,y,{align:align})
}

function pdfTextLines(doc,lines,x,y,lineHeight,size){
if(!lines || !lines.length)return
doc.setFontSize(size||9)
let cursorY=y
lines.forEach(line=>{
doc.text(String(line),x,cursorY)
cursorY+=lineHeight
})
}

async function loadImageAsDataURL(url){
try{
let res=await fetch(url,{cache:"no-store"})
if(!res.ok)return null
let blob=await res.blob()
return await new Promise(resolve=>{
let reader=new FileReader()
reader.onload=()=>resolve(reader.result)
reader.onerror=()=>resolve(null)
reader.readAsDataURL(blob)
})
}catch(e){
return null
}
}

/* REPORTE */

function llenarReporte(){

repFolio.innerText="Folio: "+folioCotizacion

repCliente.innerText="Cliente "+nombre.value

repConsumo.innerText="Consumo anual "+consumoAnual.toFixed(0)

repDiagnostico.innerText="DiagnÃ³stico "+diagnosticoTexto

repSistema.innerText=panelFinal.innerText

repArea.innerText="Ãrea requerida del sistema "+areaSistema.toFixed(1)+" mÂ²"

repPrecio.innerText=precioFinal.innerText

generarQR()

}


/* PDF */

async function generarPDF(){

const { jsPDF } = window.jspdf

generarQR()

let doc=new jsPDF({orientation:"p",unit:"mm",format:"a4"})

let plantillaData = await loadImageAsDataURL(PDF_TEMPLATE_URL)
if(plantillaData){
doc.addImage(plantillaData,"PNG",0,0,PDF_PAGE.w,PDF_PAGE.h)
}

doc.setTextColor(20,20,20)

let nombreCliente = (nombre.value||"").toUpperCase()
let referencia = folioCotizacion || ""
let folioAut = folioCotizacion || ""
let montoTexto = formatMoney(precioSistema)
let montoEnTexto = montoEnLetra(precioSistema)

pdfText(doc,nombreCliente,PDF_LAYOUT.nombre.x,PDF_LAYOUT.nombre.y,PDF_LAYOUT.nombre)
pdfText(doc,montoTexto,PDF_LAYOUT.monto.x,PDF_LAYOUT.monto.y,PDF_LAYOUT.monto)
pdfText(doc,montoEnTexto,PDF_LAYOUT.montoTexto.x,PDF_LAYOUT.montoTexto.y,PDF_LAYOUT.montoTexto)
pdfText(doc,referencia,PDF_LAYOUT.referencia.x,PDF_LAYOUT.referencia.y,PDF_LAYOUT.referencia)
pdfText(doc,folioAut,PDF_LAYOUT.folioAut.x,PDF_LAYOUT.folioAut.y,PDF_LAYOUT.folioAut)
let reporteCol1 = [
"Cliente: "+(nombre.value||""),
"Telefono: "+(telefono.value||""),
"Calle: "+(calle.value||"")+" "+(numero.value||""),
"Colonia: "+(colonia.value||""),
"CP: "+(cp.value||""),
"Ciudad: "+(ciudad.value||""),
"Consumo bimestral: "+Number(consumoBimestral||0).toFixed(0)+" kWh",
"Pago bimestral: "+formatMoney(pagoBimestral)
]

let produccionRedondeada = Math.round((produccionAnual||0)/100)*100
let retornoCalc = precioSistema && ahorroMensualGlobal ? Math.round(precioSistema/(ahorroMensualGlobal*12)) : 0

let reporteCol2 = [
"Consumo anual: "+Number(consumoAnual||0).toFixed(0)+" kWh",
"Radiacion: "+(radiacionSolar||0)+" kWh/kW/ano",
"Diagnostico: "+(diagnosticoTexto||""),
"Sistema: "+Number(sistemaKW||0).toFixed(1)+" kW",
"Paneles: "+(panelFinal ? panelFinal.innerText : ""),
"Produccion anual: "+produccionRedondeada+" kWh",
"Cobertura: "+Number(coberturaConsumo||0).toFixed(0)+"%",
"Area: "+Number(areaSistema||0).toFixed(1)+" m2",
"Ahorro mensual: "+formatMoney(ahorroMensualGlobal),
"Retorno: "+retornoCalc+" anos",
"Punto equilibrio: "+retornoCalc+" anos",
"Precio sistema: "+formatMoney(precioSistema)
]

pdfTextLines(doc,reporteCol1,PDF_REPORT.col1X,PDF_REPORT.startY,PDF_REPORT.lineHeight,PDF_REPORT.size)
pdfTextLines(doc,reporteCol2,PDF_REPORT.col2X,PDF_REPORT.startY,PDF_REPORT.lineHeight,PDF_REPORT.size)

let qrCanvas = document.querySelector("#qr canvas")

if(qrCanvas){

let qrImg = qrCanvas.toDataURL("image/png")

doc.setFillColor(255,255,255)
doc.rect(PDF_LAYOUT.qr.x,PDF_LAYOUT.qr.y,PDF_LAYOUT.qr.size,PDF_LAYOUT.qr.size,"F")
doc.addImage(qrImg,"PNG",PDF_LAYOUT.qr.x,PDF_LAYOUT.qr.y,PDF_LAYOUT.qr.size,PDF_LAYOUT.qr.size)

}

if(PDF_SHOW_RECIBO && fotoReciboBase64){

doc.addImage(fotoReciboBase64,"JPEG",20,120,170,90)

}

doc.save("cotizacion-"+folioCotizacion+".pdf")

}

/* SLIDER */

document.querySelectorAll(".slider-thumb").forEach(thumb=>{

const track=thumb.parentElement

let startX
let dragging=false

thumb.addEventListener("touchstart",e=>{
dragging=true
startX=e.touches[0].clientX
})

thumb.addEventListener("touchmove",e=>{

if(!dragging)return

let max=track.offsetWidth-thumb.offsetWidth

let x=Math.max(0,Math.min(e.touches[0].clientX-startX,max))

thumb.style.left=x+"px"

})

thumb.addEventListener("touchend",()=>{

let max=track.offsetWidth-thumb.offsetWidth

if(parseInt(thumb.style.left)>max*0.8){

nextScreen()

}

thumb.style.left="0"

dragging=false

})


})

setTimeout(()=>{nextScreen()},2000)

</script>
